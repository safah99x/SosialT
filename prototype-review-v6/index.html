<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FAF6F0" />
    <meta name="description" content="SosialT — Spend more time together in real life" />
    <title>SosialT — Review v3</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23D4A853'/></svg>" />
  </head>
  <body>
    <!-- Phone Device Frame -->
    <div class="device-frame">
      <div class="device-frame__notch">
        <div class="device-frame__notch-inner">
          <div class="device-frame__camera"></div>
        </div>
      </div>
      <div class="device-frame__status-bar">
        <span class="device-frame__time" id="device-time">9:41</span>
        <div class="device-frame__status-icons">
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
            <rect x="0" y="5" width="3" height="7" rx="0.5" fill="currentColor" opacity="0.4"/>
            <rect x="4.5" y="3" width="3" height="9" rx="0.5" fill="currentColor" opacity="0.6"/>
            <rect x="9" y="1" width="3" height="11" rx="0.5" fill="currentColor" opacity="0.8"/>
            <rect x="13.5" y="0" width="2.5" height="12" rx="0.5" fill="currentColor"/>
          </svg>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
            <path d="M8 2C5.5 2 3.2 3 1.5 4.7L0 3.2C2.1 1.2 4.9 0 8 0C11.1 0 13.9 1.2 16 3.2L14.5 4.7C12.8 3 10.5 2 8 2Z" fill="currentColor" opacity="0.4"/>
            <path d="M8 5C6.3 5 4.8 5.7 3.7 6.8L2.2 5.3C3.7 3.8 5.7 3 8 3C10.3 3 12.3 3.8 13.8 5.3L12.3 6.8C11.2 5.7 9.7 5 8 5Z" fill="currentColor" opacity="0.7"/>
            <path d="M8 8C7.2 8 6.4 8.3 5.9 8.9L8 11L10.1 8.9C9.6 8.3 8.8 8 8 8Z" fill="currentColor"/>
          </svg>
          <div class="device-frame__battery">
            <div class="device-frame__battery-body">
              <div class="device-frame__battery-fill"></div>
            </div>
            <div class="device-frame__battery-cap"></div>
          </div>
        </div>
      </div>
      <div id="app"></div>
      <div class="device-frame__home-indicator"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
